<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - 3D Ultra Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <canvas id="login-canvas"></canvas>
        <div class="login-box glass-card">
            <div class="login-header">
                <i class="fas fa-cube"></i>
                <h2>Welcome Back</h2>
                <p>Login to your 3D Ultra account</p>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email address" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                    <i class="fas fa-eye toggle-password"></i>
                </div>
                <div class="form-options">
                    <label>
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="forgot-password.html">Forgot Password?</a>
                </div>
                <button type="submit" class="btn-login">Login <i class="fas fa-arrow-right"></i></button>
            </form>
            <div class="social-login">
                <p>Or login with</p>
                <div class="social-icons">
                    <button class="social-btn google"><i class="fab fa-google"></i></button>
                    <button class="social-btn github"><i class="fab fa-github"></i></button>
                    <button class="social-btn discord"><i class="fab fa-discord"></i></button>
                </div>
            </div>
            <div class="signup-link">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="login.js"></script>
</body>
</html>
